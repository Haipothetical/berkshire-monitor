name: Daily Holdings Monitor

on:
  schedule:
    # 14:00 UTC (9 AM ET / 6 AM PT) on weekdays — aligned with SEC business hours
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no emails)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '0'

permissions:
  contents: write

jobs:
  monitor:
    name: Fetch 13F and update holdings
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run holdings monitor
        env:
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          EMAIL_ENABLED: ${{ secrets.EMAIL_ENABLED || 'false' }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          DRY_RUN: ${{ github.event.inputs.dry_run || '1' }}
          LOG_LEVEL: 'INFO'
        run: python monitor_holdings.py

      - name: Commit updated CSV if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add berkshire_holdings.csv alerted_keys.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: update holdings CSV [$(date -u '+%Y-%m-%d')]"
            git push
          fi
